services:
  - type: web
    name: nexus-gate-realtime
    env: docker
    region: singapore
    plan: free
    # Render needs to know where the Dockerfile is. If Render is connected
    # to the whole repo (root), it looks for ./Dockerfile at the root —
    # but our Dockerfile is in mini-services/realtime/. Set rootDir so
    # Render cd's into mini-services/realtime/ before building.
    rootDir: mini-services/realtime
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://nexus-gate-web.vercel.app,https://nexus-gate.vercel.app,http://localhost:3000"
