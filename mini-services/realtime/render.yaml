services:
  - type: web
    name: nexus-gate-realtime
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://nexus-gate-web.vercel.app,https://nexus-gate.vercel.app,http://localhost:3000"
