services:
  - type: web
    name: nexus-gate-realtime
    # Use Render's native Bun runtime — no need to install bun via npm
    # (which fails with permission errors on Render's Node runtime).
    # Render supports Bun natively for web services.
    runtime: bun
    region: singapore
    plan: free
    # Render cd's into this directory before building/starting.
    rootDir: mini-services/realtime

    # Just install dependencies. No build step needed — Bun runs
    # TypeScript directly. The 'build' script in package.json is a
    # no-op echo, so 'bun run build' also works if Render calls it.
    buildCommand: bun install

    # Start the realtime service. Bun runs TypeScript directly.
    # Render sets PORT automatically.
    startCommand: bun index.ts

    # Health check — Render polls this path; if it returns non-200,
    # the deploy is marked failed and rolled back.
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://nexus-gate-web.vercel.app,https://nexus-gate.vercel.app,http://localhost:3000"
