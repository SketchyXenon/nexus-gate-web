services:
  - type: web
    name: nexus-gate-realtime
    # Use native Node runtime (not Docker) — simpler and more reliable.
    # Docker was causing multiple issues (PORT override, missing build
    # script, wrong start command inherited from root render.yaml).
    runtime: node
    region: singapore
    plan: free
    # Render cd's into this directory before building/starting.
    rootDir: mini-services/realtime

    # Install bun (Render's Node runtime doesn't include it), then
    # install dependencies. No build step needed — the service is a
    # single TypeScript file run directly by Bun.
    buildCommand: npm install -g bun && bun install

    # Start the realtime service. Bun runs TypeScript directly — no
    # compilation needed. Render sets PORT automatically.
    startCommand: bun index.ts

    # Health check — Render polls this path; if it returns non-200,
    # the deploy is marked failed and rolled back.
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://nexus-gate-web.vercel.app,https://nexus-gate.vercel.app,http://localhost:3000"
